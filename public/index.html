<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>五子棋联机对战</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel start-panel" id="startPanel">
        <div class="hero-mark">联机五子棋</div>
        <h1>五子棋联机对战</h1>
        <p class="subtitle">创建房间后把链接发给好友，好友打开网页输入同一房间码即可开局。双方阵营会随机分配，黑棋先手。</p>

        <label class="field">
          <span>你的昵称</span>
          <input id="nameInput" type="text" maxlength="20" placeholder="请输入昵称" />
        </label>

        <div class="actions">
          <button id="createRoomBtn" class="btn btn-primary">创建房间</button>
        </div>

        <div class="join-row">
          <input id="roomInput" type="text" maxlength="6" placeholder="输入房间码（6位）" />
          <button id="joinRoomBtn" class="btn">加入房间</button>
        </div>

        <p id="startError" class="message error"></p>
      </section>

      <section class="panel game-panel hidden" id="gamePanel">
        <header class="topbar">
          <div>
            <p class="meta">房间号</p>
            <p id="roomLabel" class="code">------</p>
          </div>
          <div class="top-actions">
            <button id="restartBtn" class="btn">重新开局</button>
            <button id="undoBtn" class="btn">悔棋</button>
            <button id="leaveBtn" class="btn">退出房间</button>
          </div>
        </header>

        <div class="share-row">
          <input id="shareLink" type="text" readonly />
          <button id="copyBtn" class="btn btn-primary">复制链接</button>
        </div>

        <div class="player-row">
          <p id="blackPlayer" class="chip chip-black">黑棋：等待加入...</p>
          <p id="whitePlayer" class="chip chip-white">白棋：等待加入...</p>
        </div>

        <p id="statusText" class="status"></p>
        <p id="restartHint" class="restart-hint"></p>
        <p id="noticeText" class="message"></p>

        <div id="previewActions" class="preview-actions hidden">
          <span id="previewText" class="preview-text">已选择一个落点</span>
          <button id="confirmMoveBtn" class="btn btn-primary">确认落子</button>
          <button id="cancelPreviewBtn" class="btn">取消预览</button>
        </div>

        <div class="board-wrap">
          <canvas id="boardCanvas" width="620" height="620"></canvas>
        </div>
      </section>
    </main>

    <div id="resultModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
      <div class="modal-card">
        <p class="modal-kicker">对局结果</p>
        <h2 id="resultTitle">胜负已分</h2>
        <p id="resultMessage">本局已经结束。</p>
        <div class="modal-actions">
          <button id="closeResultBtn" class="btn">知道了</button>
          <button id="restartFromResultBtn" class="btn btn-primary">申请重新开局</button>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
