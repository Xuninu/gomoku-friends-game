<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gomoku Friends</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel start-panel" id="startPanel">
        <h1>Gomoku Friends</h1>
        <p class="subtitle">Create a room, share the code, and battle with your friend in real time.</p>

        <label class="field">
          <span>Nickname</span>
          <input id="nameInput" type="text" maxlength="20" placeholder="Player" />
        </label>

        <div class="actions">
          <button id="createRoomBtn" class="btn btn-primary">Create Room</button>
        </div>

        <div class="join-row">
          <input id="roomInput" type="text" maxlength="6" placeholder="Room code" />
          <button id="joinRoomBtn" class="btn">Join Room</button>
        </div>

        <p id="startError" class="message error"></p>
      </section>

      <section class="panel game-panel hidden" id="gamePanel">
        <header class="topbar">
          <div>
            <p class="meta">Room</p>
            <p id="roomLabel" class="code">------</p>
          </div>
          <div class="top-actions">
            <button id="restartBtn" class="btn">Restart</button>
            <button id="undoBtn" class="btn">Undo</button>
            <button id="leaveBtn" class="btn">Leave</button>
          </div>
        </header>

        <div class="share-row">
          <input id="shareLink" type="text" readonly />
          <button id="copyBtn" class="btn btn-primary">Copy Link</button>
        </div>

        <div class="player-row">
          <p id="blackPlayer" class="chip chip-black">Black: waiting...</p>
          <p id="whitePlayer" class="chip chip-white">White: waiting...</p>
        </div>

        <p id="statusText" class="status"></p>
        <p id="noticeText" class="message"></p>

        <div class="board-wrap">
          <canvas id="boardCanvas" width="620" height="620"></canvas>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
